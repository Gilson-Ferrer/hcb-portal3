<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASYNCX | Hackathon Challenge Box</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <style>
    :root {
            --bg-color: #050505;
            --card-bg: rgba(15, 15, 15, 0.75); 
            --accent-color: #00f2ff;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: rgba(255, 255, 255, 0.1); 
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(5, 5, 5, 0.45), rgba(5, 5, 5, 0.85)), 
                url("{{ url_for('static', filename='img/login_bg.webp') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .alert-box {
            background-color: #d32f2f;
            border-radius: 12px; 
            padding: 14px;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 12px rgba(211, 47, 47, 0.3);
            text-align: center;
            opacity: 1;
            transform: scale(1);
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                        transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                        margin 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                        padding 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                        max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 100px; 
            overflow: hidden;
        }

        .alert-text {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            color: #ffffff;
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .login-container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 242, 255, 0.05);
            width: 100%;
            max-width: 360px;
            text-align: center;
            position: relative;
            z-index: 10;
            margin: 10px;
        }

        .contractor-brand {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
            background: linear-gradient(90deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background-color: rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(0, 242, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
            margin-top: 1rem;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-logo {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .footer-logo span {
            color: var(--accent-color);
            font-weight: bold;
        }

        .btn-secondary {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 1rem;
            background-color: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .btn-secondary:hover {
            background-color: rgba(0, 242, 255, 0.1);
            transform: translateY(-1px);
        }

        .btn-secondary:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="login-container">

        <div class="contractor-brand">Painel de acesso</div>
        <h1>HACKATHON CHALLENGE</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert-box" id="login-alert-ticket">
                        <p class="alert-text">
                            {{ message }}
                        </p>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form action="/login" method="post" onsubmit="showLoader('Autenticando...')">
            <div class="input-group">
                <input type="text" name="name" placeholder="ID do Time" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Código de Acesso" required>
            </div>
            <button type="submit">Entrar</button>
        </form>
        <a href="/leaderboard" class="btn-secondary" onclick="showLoader('Acessando Placar...')">Acompanhar Placar</a>

        <div class="footer-logo">
            Desenvolvido por <span>ASYNCX</span>
        </div>
    </div>
    {% include 'loader_global.html' %}

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const alertBox = document.getElementById('login-alert-ticket');
            
            if (alertBox) {
                setTimeout(() => {
                    alertBox.style.opacity = "0";
                    alertBox.style.transform = "scale(0.95)";
                    alertBox.style.maxHeight = "0";
                    alertBox.style.padding = "0 14px";
                    alertBox.style.margin = "0";
                    setTimeout(() => {
                        alertBox.remove();
                    }, 500);
                }, 5000);
            }
        });
    </script>
</body>
</html>
